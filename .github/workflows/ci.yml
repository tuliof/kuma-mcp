name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    name: lint & build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Unit tests
        run: bun run test:unit

      - name: Integration tests
        run: bun run test:integration
