name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    env:
      # Disable git hooks in CI: local Husky hooks may depend on tools (e.g. bun)
      # that are not installed in the release runner and can block semantic-release.
      HUSKY: '0'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Release
        run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
